<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        --accent: #1a73e8;
        --accent-dark: #1558b0;
        --ok-bg: #e6f4ea;
        --ok-fg: #137333;
        --err-bg: #fce8e6;
        --err-fg: #c5221f;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Google Sans', Roboto, Arial, sans-serif;
        margin: 0;
        padding: 20px 16px;
        color: #202124;
        background: #fff;
      }

      h1 {
        font-size: 15px;
        font-weight: 500;
        margin: 0 0 4px;
      }

      p.subtitle {
        font-size: 12px;
        color: #5f6368;
        margin: 0 0 20px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        padding: 11px 16px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.05s ease;
      }
      button:hover:not(:disabled) { background: var(--accent-dark); }
      button:active:not(:disabled) { transform: scale(0.98); }
      button:disabled { opacity: 0.6; cursor: default; }

      .spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: -2px;
        margin-inline-end: 7px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #status {
        margin: 16px 0 0;
        padding: 0;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-line;
        border-radius: 8px;
        transition: all 0.2s ease;
      }
      #status.show { padding: 12px 14px; }
      #status.ok  { background: var(--ok-bg);  color: var(--ok-fg); }
      #status.err { background: var(--err-bg); color: var(--err-fg); }
    </style>
  </head>
  <body>
    <h1>Fix Text Direction</h1>
    <p class="subtitle">
      Fixes brackets that appear flipped or on the wrong side when your text mixes Hebrew or Arabic with English.
    </p>

    <button id="btn" onclick="run()">Fix Text Direction</button>
    <p id="status"></p>

    <script>
      var btn = document.getElementById('btn');
      var status = document.getElementById('status');

      function setStatus(text, type) {
        status.textContent = text;
        status.className = 'show ' + type;
      }

      function run() {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Running...';
        status.className = '';
        status.textContent = '';

        google.script.run
          .withSuccessHandler(function(result) {
            setStatus(result, 'ok');
            reset();
          })
          .withFailureHandler(function(err) {
            setStatus('Error: ' + err.message, 'err');
            reset();
          })
          .fixBidiBrackets();
      }

      function reset() {
        btn.disabled = false;
        btn.textContent = 'Fix Text Direction';
      }
    </script>
  </body>
</html>
